name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@1.93.0
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy
      - run: npm run check
      - run: git diff --exit-code -- dist
